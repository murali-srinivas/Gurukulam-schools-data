<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="School Data Portal - Secure login for school student management system">
    <title>School Data Portal - Login</title>
    <link rel="stylesheet" href="css/styles.css?v=1.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <h1>School Data Portal</h1>
                    <p>Student Management & Examination System</p>
                </div>

                <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="username">User ID</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" placeholder="Enter your User ID" required autocomplete="username">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div class="login-footer">
                    <p>Contact admin for access credentials</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Visual Debug Console for troubleshooting -->
    <div id="debug-console" style="margin: 20px auto; max-width: 440px; padding: 15px; background: rgba(0,0,0,0.8); border: 1px solid #ef4444; border-radius: 8px; color: #f87171; font-family: monospace; font-size: 11px; display: none;">
        <h4 style="margin-top: 0; margin-bottom: 8px; text-transform: uppercase; color: #ef4444; display: flex; justify-content: space-between;">
            <span>System Debug Log</span>
            <button onclick="document.getElementById('debug-console').style.display='none'" style="background: none; border: none; color: #94a3b8; cursor: pointer;">✕</button>
        </h4>
        <div id="debug-log" style="max-height: 120px; overflow-y: auto; white-space: pre-wrap;"></div>
    </div>

    <script>
        const consoleEl = document.getElementById('debug-console');
        const logEl = document.getElementById('debug-log');
        
        function appendDebug(msg, type = 'info') {
            if (consoleEl && logEl) {
                consoleEl.style.display = 'block';
                const color = type === 'error' ? '#ef4444' : (type === 'warning' ? '#f59e0b' : '#10b981');
                logEl.innerHTML += `<div style="margin-bottom: 5px; color: ${color};">[${type.toUpperCase()}] ${msg}</div>`;
                logEl.scrollTop = logEl.scrollHeight;
            }
        }

        // Global error logging for on-screen visibility
        window.addEventListener('error', function(e) {
            appendDebug(`${e.message} at ${e.filename}:${e.lineno}:${e.colno}`, 'error');
        });
        window.addEventListener('unhandledrejection', function(e) {
            appendDebug(e.reason, 'error');
        });

        // Intercept console calls
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = function(...args) {
            originalLog.apply(console, args);
            appendDebug(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '), 'info');
        };
        console.error = function(...args) {
            originalError.apply(console, args);
            appendDebug(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '), 'error');
        };
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            appendDebug(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '), 'warning');
        };
    </script>
    <script src="js/supabase-config.js?v=1.3"></script>
    <script src="js/auth.js?v=1.3"></script>
</body>
</html>
